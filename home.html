<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home - QBYT</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/home.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

</head>

<body>

    <div class="wrapper">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">

            <!-- LOGO -->
            <div class="logo-area">

                <div class="logo-box">
                    <i class="bi bi-music-note-beamed"></i>
                </div>

                <h2>QBYT</h2>

            </div>

            <!-- MENU -->
            <ul class="menu-list">

                <li>
                    <a href="#">
                        <i class="bi bi-house-door-fill"></i>
                        <span>Inicio</span>
                    </a>
                </li>

                <li>
                    <a href="#">
                        <i class="bi bi-journal-music"></i>
                        <span>Cursos</span>
                    </a>
                </li>

                <li>
                    <a href="#">
                        <i class="bi bi-book"></i>
                        <span>Mis clases</span>
                    </a>
                </li>

                <li>
                    <a href="#">
                        <i class="bi bi-gear"></i>
                        <span>Configuración</span>
                    </a>
                </li>

                <li>
                    <a href="./admin/perfil_admin.html">
                        <i class="bi bi-person-circle"></i>
                        <span>Perfil</span>
                    </a>
                </li>

                <li>
                    <a href="./index.html">
                        <i class="bi bi-box-arrow-left"></i>
                        <span>Salir</span>
                    </a>
                </li>

            </ul>

        </aside>

        <!-- MAIN -->
        <main class="main-content">

            <!-- TOPBAR -->
            <div class="topbar">

                <!-- BOTON MENU -->
                <button class="menu-toggle" onclick="toggleSidebar()">

                    <i class="bi bi-list"></i>

                </button>

                <h1>
                    Bienvenido a QBYT
                </h1>

            </div>

            <!-- CURSOS -->
            <section class="courses-section">

                <div class="row g-4">

                    <!-- CARD -->
                    <div class="col-md-4">

                        <div class="course-card">

                            <img src="https://aprendomusica.com/imagen/cards/quiz_tempo_01.png" alt="Curso">

                            <h3>
                                Sol y Mi
                            </h3>

                            <p>
                                Aprende a reconocer notas musicales.
                            </p>

                            <a href="#" class="course-btn">
                                Entrar al curso
                            </a>

                        </div>

                    </div>

                    <!-- CARD -->
                    <div class="col-md-4">

                        <div class="course-card">

                            <img src="https://cdn-icons-png.flaticon.com/512/3659/3659899.png" alt="Curso">

                            <h3>
                                Teclado Mágico
                            </h3>

                            <p>
                                Practica melodías interactivas.
                            </p>

                            <a href="#" class="course-btn">
                                Entrar al curso
                            </a>

                        </div>

                    </div>

                    <!-- CARD -->
                    <div class="col-md-4">

                        <div class="course-card">

                            <img src="https://blog.laminasyaceros.com/hs-fs/hubfs/Musica%20y%20cerebro%20laminas%20y%20aceros.jpg"
                                alt="Curso">

                            <h3>
                                Simón Musical
                            </h3>

                            <p>
                                Entrena tu memoria auditiva.
                            </p>

                            <a href="#" class="course-btn">
                                Entrar al curso
                            </a>

                        </div>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <!-- JS -->
    <script>

        function toggleSidebar() {
            document
                .getElementById("sidebar")
                .classList
                .toggle("collapsed");
        }

    </script>

</body>

</html>
