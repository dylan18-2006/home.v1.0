<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login QBYT</title>
    <link rel="stylesheet" href="./css/estilo_ingreso.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
        rel="stylesheet">

</head>

<body>
    <section class="login-section">
        <div class="container">

            <div class="login-card mx-auto">

                <!-- LOGO -->
                <div class="text-center mb-4">
                    

                    <div class="logo-circle mx-auto mb-3">
                        <i class="bi bi-music-note-beamed"></i>
                    </div>

                    <h1>QBYT</h1>

                    <p>
                        Inicia sesión y continúa tu entrenamiento musical
                    </p>

                </div>

                <!-- FORM -->
                <form action="./admin/admin.html" method="get">

                    <div class="mb-3">

                        <label class="form-label text-white">
                            Usuario
                        </label>

                        <input type="text"
                            class="form-control custom-input"
                            placeholder="Ingresa tu usuario"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label text-white">
                            Contraseña
                        </label>

                        <input type="password"
                            class="form-control custom-input"
                            placeholder="Ingresa tu contraseña"
                            required>

                    </div>
                    <!-- ROL -->
                    <div class="mb-4">

                        <label class="form-label text-white">
                            Selecciona tu rol
                        </label>

                        <select class="form-select custom-input" id="rolSelect" required>

                            <option selected disabled>
                                Selecciona una opción
                            </option>

                            <option value="./admin/admin.html">
                                Administrador
                            </option>

                            <option value="./docente/doce.html">
                                Docente
                            </option>

                            <option value="./estudiante/perfilestu.html">
                                 Estudiante</a>
                            </option>

                        </select>

                    </div>
                    <script>
                       document.getElementById("rolSelect").addEventListener("change", function () {
                        window.location.href = this.value;
                    });
                    </script>

                    <!-- BOTON -->
                    <button type="submit" class="login-btn w-100">
                        Iniciar sesión
                    </button>

                </form>

                <!-- LINKS -->
                <div class="extra-links text-center mt-4">

                    <a href="#">
                        ¿Olvidaste tu contraseña?
                    </a>

                    <br>

                    <a href="./index.html">
                        ← Volver al inicio
                    </a>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
